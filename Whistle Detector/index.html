<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistle Counter</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;500;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Whistle Counter</h1>
            <div id="status-indicator" class="status-badge">Ready</div>
        </header>

        <main>
            <!-- Visualizer -->
            <div class="visualizer-container">
                <canvas id="visualizer" width="300" height="100"></canvas>
            </div>

            <div class="counter-display">
                <div id="count-circle" class="count-circle">
                    <span id="whistle-count">0</span>
                    <span class="label">Whistles</span>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-panel">
                <!-- Target Control -->
                <div class="control-group">
                    <div class="control-header">
                        <label for="target-input"><i class="fas fa-bullseye"></i> Target Limit</label>
                    </div>
                    <div class="input-wrapper">
                        <button id="btn-decrement" class="icon-btn" aria-label="Decrease target"><i
                                class="fas fa-minus"></i></button>
                        <input type="number" id="target-input" value="1" min="1" max="99" step="1">
                        <button id="btn-increment" class="icon-btn" aria-label="Increase target"><i
                                class="fas fa-plus"></i></button>
                    </div>
                </div>

                <!-- Sensitivity Control -->
                <div class="control-group">
                    <label for="sensitivity-slider"><i class="fas fa-microphone-lines"></i> Sensitivity</label>
                    <div class="slider-wrapper">
                        <input type="range" id="sensitivity-slider" min="50" max="255" value="180">
                    </div>
                </div>
            </div>

        </main>

        <footer class="controls-bar">
            <button id="btn-history" class="btn btn-secondary"><i class="fas fa-history"></i> History</button>
            <button id="btn-reset" class="btn btn-secondary"><i class="fas fa-undo"></i> Reset</button>
            <button id="btn-toggle" class="btn btn-primary"><i class="fas fa-microphone"></i> Start</button>
        </footer>
    </div>

    <!-- Alert Modal -->
    <div id="alert-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Target Reached!</h2>
            <p>Your pressure cooker has whistled <span id="modal-count">3</span> times.</p>
            <div class="modal-actions">
                <button id="btn-dismiss" class="btn btn-secondary">Continue</button>
                <button id="btn-stop-record" class="btn btn-primary stop">Stop & Save</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content history-content">
            <div class="history-header card-header">
                <h3 class="card-title"><i class="fas fa-history"></i> Session History</h3>
                <button id="btn-clear-history" class="text-btn btn-tool"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="card-body p-0">
                <ul id="history-list" class="history-list">
                    <!-- Items injected here -->
                    <li class="empty-state">No history yet</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button id="btn-close-history" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
